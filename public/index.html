<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>YouTube Audio Player</h2>
    <h3 id="title">Title</h3>
    <div>
        <button id="prevBtn">⏮</button>
        <button id="nextBtn">⏭</button>
        <select id="playMode">
            <option value="all">All</option>
            <option value="one">One</option>
            <option value="shuffle">Shuffle</option>
        </select>
    </div>
    <audio id="audio" controls style="width:100%"></audio>
    <hr>
    <div class="tabbar">
        <button class="tabBtn active" data-tab="searchTab">Search</button>
        <button class="tabBtn" data-tab="playlistTab">Playlist</button>
        <button class="tabBtn" data-tab="offlineTab">Offline</button>
    </div>
    <div id="searchTab" class="tabContent active">
        <h2>Search</h2>
        <input id="searchInput" placeholder="Search YouTube Music..." autocomplete="off">
        <div id="searchDropdown"></div>
        <button id="searchBtn">Search</button>
        <div id="searchSuggestions" style="display: none;"></div>
        <div id="pagination"></div>
        <hr>
        <div id="searchResults"></div>
    </div>

    <div id="playlistTab" class="tabContent">
        <h2>Playlist</h2>
        <input id="url" style="max-width:600px" placeholder="YouTube URL">
        <button id="addBtn">Add</button>
        <hr>
        <div id="playlistInfo"></div>
        <div id="playlist"></div>
        <br>
        <button id="clearPlaylistBtn">Clear Playlist</button>
    </div>
    <div id="offlineTab" class="tabContent">
        <h2>Offline</h2>
        <div id="offlineInfo"></div>
        <div id="offlinePlaylist"></div>
    </div>
    <script>
        let searchTimer;

        const input =
            document.getElementById(
                'searchInput'
            );

        input.addEventListener(
            'input',
            () => {

                clearTimeout(
                    searchTimer
                );

                const q =
                    input.value.trim();

                if (
                    q.length < 2
                ) {

                    document
                        .getElementById(
                            'searchDropdown'
                        )
                        .innerHTML = '';

                    return;
                }

                searchTimer =
                    setTimeout(
                        () => searchTracks(q),
                        300
                    );
            }
        );
    </script>

    <script>

        document
            .querySelectorAll('.tabBtn')
            .forEach(btn => {

                btn.onclick = async () => {

                    document
                        .querySelectorAll('.tabBtn')
                        .forEach(
                            b => b.classList.remove(
                                'active'
                            )
                        );

                    document
                        .querySelectorAll('.tabContent')
                        .forEach(
                            t => t.classList.remove(
                                'active'
                            )
                        );

                    btn.classList.add(
                        'active'
                    );

                    document
                        .getElementById(
                            btn.dataset.tab
                        )
                        .classList.add(
                            'active'
                        );

                    if (
                        btn.dataset.tab ===
                        'offlineTab'
                    ) {
                        await renderOfflinePlaylist();
                    }
                };
            });


    </script>
    <script>
        document
            .getElementById('clearPlaylistBtn')
            .onclick = async () => {

                if (
                    !confirm(
                        'Удалить весь плейлист?'
                    )
                ) return;
                const root = await navigator.storage.getDirectory();
                try {
                    await root.removeEntry('playlist.json');
                }
                catch (e) { console.log('playlist.json not found'); }
                // Удаляем папку audio со всеми треками 
                try {
                    await root.removeEntry('audio', { recursive: true });
                }
                catch (e) { console.log('audio folder not found'); }
                // Удаляем папку covers
                try {
                    await root.removeEntry('covers', { recursive: true });
                }
                catch (e) { console.log('covers folder not found'); }
                renderPlaylist();
            };
    </script>

    <script>
        document
            .getElementById('addBtn')
            .onclick = async () => {

                const url =
                    document
                        .getElementById('url')
                        .value
                        .trim();

                const media =
                    await fetch(
                        `/media-info?url=${encodeURIComponent(url)}`
                    )
                        .then(r => r.json());

                const playlist =
                    await loadPlaylist();


                const coverResponse =
                    await fetch(media.thumbnail);

                const coverBlob =
                    await coverResponse.blob();

                const root =
                    await navigator.storage
                        .getDirectory();

                const coversDir =
                    await root.getDirectoryHandle(
                        'covers',
                        { create: true }
                    );

                const coverHandle =
                    await coversDir.getFileHandle(
                        `${media.id}.jpg`,
                        { create: true }
                    );

                const writable =
                    await coverHandle.createWritable();

                await writable.write(
                    coverBlob
                );

                await writable.close();


                playlist.tracks.push({

                    id: media.id,

                    originalUrl: url,

                    title: media.title,

                    coverFile:
                        `covers/${media.id}.jpg`,

                    artist: media.channel,

                    thumbnail: media.thumbnail,

                    duration: media.duration,

                    bitrate: media.bitrate,

                    samplerate: media.samplerate,

                    file_format: media.ext,

                    bpm: null,

                    key: null,

                    streamUrl: media.streamUrl,

                    streamUrlUpdatedAt: Date.now(),

                    downloaded: false,
                    localFile: null,
                    localFileSize: null,
                    playCount: 0,
                    lastPlayed: null,

                    addedAt: Date.now()
                });

                await savePlaylist(
                    playlist
                );

                renderPlaylist();
            };
    </script>

    <!-- <div
        style="position:fixed;bottom:10px;right:10px;background:#111;color:#0f0;padding:10px;font-family:monospace;max-width:400px;z-index:9999;">
        <button onclick="loadDebug()">Load Debug</button>
        <pre id="debug"></pre>
    </div> -->

    <script>

        async function loadDebug() {
            const res = await fetch('/debug');
            const data = await res.json();

            document.getElementById('debug').textContent =
                "NODE: " + data.node + "\n" +
                "PLATFORM: " + data.platform + "\n" +
                "ARCH: " + data.arch + "\n\n" +
                "YT-DLP PATH: " + data.ytDlpPath + "\n" +
                "YT-DLP VERSION: " + data.ytDlpVersion + "\n\n" +
                "FFMPEG: " + data.ffmpegVersion + "\n\n" +
                "PATH:\n" + data.envPath;
        }
    </script>

    <script>
        window.addEventListener(
            'DOMContentLoaded',
            async () => {

                await renderPlaylist();
                await renderOfflinePlaylist();

            }
        );
    </script>
    <script src="scripts.js"></script>
</body>

</html>
